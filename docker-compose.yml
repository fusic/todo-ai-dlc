services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    ports:
      - "8000:8000"

  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: ap-northeast-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Waiting for DynamoDB Local...'
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 > /dev/null 2>&1; do
          sleep 2
        done
        echo 'DynamoDB Local is ready. Creating table...'
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name TodoTable \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @todo-ai-dlc/backend dev
    ports:
      - "3001:3001"
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: ap-northeast-1
      TABLE_NAME: TodoTable
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      # オリジン検証（BR-013 / RF-16）の dev 専用値 — 検証ミドルウェアは常時有効（D-1）。
      # 本番値（Secrets Manager 自動生成）とは完全に独立した自明な値（C-5 — コミット可）
      ORIGIN_VERIFY_SECRET: local-dev-only
    volumes:
      - ./tsconfig.json:/app/tsconfig.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/vitest.config.ts:/app/packages/backend/vitest.config.ts
      - ./packages/backend/tsconfig.json:/app/packages/backend/tsconfig.json
      - backend_node_modules:/app/node_modules
      - backend_pkg_node_modules:/app/packages/backend/node_modules
      - backend_shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @todo-ai-dlc/frontend dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:3001
      VITE_USE_POLLING: ${VITE_USE_POLLING:-}
    volumes:
      - ./tsconfig.json:/app/tsconfig.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
      - ./packages/frontend/tsconfig.json:/app/packages/frontend/tsconfig.json
      - frontend_node_modules:/app/node_modules
      - frontend_pkg_node_modules:/app/packages/frontend/node_modules
      - frontend_shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  backend_pkg_node_modules:
  backend_shared_node_modules:
  frontend_node_modules:
  frontend_pkg_node_modules:
  frontend_shared_node_modules:
