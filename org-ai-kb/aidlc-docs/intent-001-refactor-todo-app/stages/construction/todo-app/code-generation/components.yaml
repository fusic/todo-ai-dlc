Component:
  Id: CMP-001
  Name: "Todo Frontend"
  Unit: UNIT-001   # todo-app（units-generation で追記 — units.md 参照）
  Behaviour-summary: >-
    エンドユーザーが TODO を操作するための対話面（SPA）。TODO の一覧表示・新規作成・
    インライン編集・完了切替・削除の操作と、ロード中/エラー/空状態の提示を担う。
    業務ルールの強制点ではなく、コントラクト（CMP-003）に従って CMP-002 を呼び出す利用者。
  Responsibilities:
    - "TODO 一覧の表示: createdAt 降順の安定表示（RF-06 の表示面）と 0 件時の空状態メッセージ"
    - "各アイテムの title / completed / createdAt の表示（RF-08 で createdAt 表示を追加し FR-002 ドリフトを解消）"
    - "新規作成フォームの提供（BT-1 の入力面。文字数の入力補助は CMP-003 の共有定数 200/1000 を参照する UX 目的であり、防衛線ではない）"
    - "インライン編集・完了トグル・削除の操作面（BT-3 / BT-4 / BT-5）"
    - "ミューテーション失敗時のユーザーへのエラー表示と未処理 rejection の解消（RF-05）"
    - "API クライアントの保守: 未使用クライアント fetchTodo の削除（RF-09。GET /api/todos/:id エンドポイント自体は CMP-002 が維持）"
  Boundaries:
    - "業務ルールの強制（検証・ID 生成・completed 初期化・タイムスタンプ・永続化）は所有しない — CMP-002 の責務"
    - "コントラクト定義（型・schema・制約定数）は所有しない — CMP-003 を参照する（RF-03 で重複定義を解消）"
    - "Todo エンティティ（ENT-001）を所有しない — 表示・操作のみ"
    - "内部の実装構造（container/presentational 分割、API クライアントモジュール）はコンポーネント境界ではない"
  Source:
    Requirements:
      - FR-001
      - FR-002
      - FR-003
      - FR-004
      - RF-05
      - RF-06   # 実現箇所（API かフロントか）は設計ステージで決定 — CMP-002 と択一の候補
      - RF-08
      - RF-09
      - RF-13   # build/typecheck 分離 — 本パッケージのビルド定義に着地（業務振る舞い変更なし）
      - NFR-004
      - BP-1
    Business-Transactions:
      - BT-1
      - BT-2
      - BT-3
      - BT-4
      - BT-5
  Dependency:
    - Component:
        Id: CMP-002
        Name: "Todo Backend API"
        Interaction: "実行時に HTTP（/api、JSON）で BT-1〜BT-5 の CRUD を呼び出す。コンパイル時依存はない"
    - Component:
        Id: CMP-003
        Name: "Shared Contract"
        Interaction: "ビルド時に Todo / 入力型と制約定数（200/1000）を workspace: 依存で import する（RF-03）"
  Dependent-Component: []
  Entities: {}
  Functional-Design-References:   # functional-design で追記（copy-forward 拡張 — 2026-06-10）
    Entities: []   # ENT-001 を所有しない（表示・操作のみ — Boundaries どおり）
    Rules:
      - "BR-011 — ミューテーション失敗のユーザー可視エラー（RF-05。本コンポーネントが従う唯一の振る舞い規則）"
      - "BR-014 — CMP-003 からは型と制約定数のみ import（消費側として遵守 — Q4=a）"
    Workflows:
      - "WF-001〜WF-005（functional-spec.md — BT-1〜BT-5 の操作面）"
    State-Machines: []   # SM-001 の所有者は CMP-002
    APIs:
      - "consumer として: API-001 / API-002 / API-004 / API-005（api-specification.md。API-003 は RF-09 で未使用クライアント削除後は消費しない。API-006 は消費しない）"
    Decisions:
      - "Q1=a: 一覧の防衛的ソートは行わない（順序保証は API-002 のコントラクト — BR-010）"
  NFR-Annotations:   # nfr-design で追記（copy-forward 拡張 — 2026-06-10。正は nfr-specification.md）
    Quality-Targets:
      - "QT-6（ユーザー面）: ミューテーション失敗のユーザー可視化（BR-011 — 観測性の UI 側）"
      - "QT-7: CI の lint / typecheck / test / E2E 対象（RF-01/02。build と typecheck の分離は RF-13）"
    Data-Classification: "public — 認証なしデモ・PII なし・単一共有リスト（A-2）。表示データは全利用者共通"
    Resiliency:
      - "ミューテーション失敗はユーザー可視エラー（BR-011）。自動リトライは導入しない（人間が再操作）"
      - "一覧取得失敗は既存のエラー状態表示を維持"
    Observability:
      - "E2E（Playwright — D-7）が既存 data-testid を locator として使用（RF-02 受入基準）"
      - "フロント側の計測（RUM 等）は対象外（OOS-9 — QT-1 rationale）"
    Scalability: "CloudFront（CDN）による静的配信スケール — 追加設計不要（C-1）"
    Security:
      - "CloudFront セキュリティヘッダ / CSP connect-src 'self' を維持（AR-O10 — 既存構成）"
      - "secrets を一切保持しない（dev ヘッダ値の注入はローカル構成側 — D-1。本コンポーネントのコードには持たない）"
    Tech-Stack-Deltas:
      - "Vite 7 / Vitest 3 / Biome 2 への更新対象（RF-18 — C-7 の Node エンジン要件確認を含む）"
  Infrastructure-Mappings:   # infrastructure-design で追記（copy-forward 拡張 — 2026-06-10。正は infrastructure-specification.md）
    Compute: "なし — 静的配信のみ（S3 FrontendBucket + CloudFront Distribution、既存据置 — C-1）"
    Storage: "S3 FrontendBucket（非公開・SSE-S3・全公開ブロック — 据置）。配備は BucketDeployment（S3 同期 + CloudFront invalidation）"
    Network: "CloudFront default behavior（HTTPS 強制・セキュリティヘッダ / CSP connect-src 'self' 据置 — AR-O10）。SPA fallback（403/404 → index.html）据置"
    IAM: "CloudFront → S3 は OAC のみ（据置）。本コンポーネント自体は実行ロールを持たない"
    Observability: "なし（RUM 等は OOS-9 で対象外）。配信面の検知は API 側アラームの範囲外 — 設計どおり"
    Deployment: "frontend build（dist/ 生成）が cdk synth/deploy の前提（DEP-O2 — infrastructure-specification.md Deployment Strategy）"
  Implementation-References:   # code-generation で追記（copy-forward 拡張 — 2026-06-10。全対応表は implementation-map.md が正）
    Status: "implemented — RF-05/06(表示面)/08/09/13 完了（P1）+ RF-18（Vite 7 / Vitest 3）完了（P2）。全テスト green"
    Sources:
      - "packages/frontend/src/App.tsx — ルート（actionError バナー = BR-011 / loadTodos useCallback 化 = Biome 2 対応）"
      - "packages/frontend/src/components/TodoForm.tsx — 作成専用フォーム（失敗時入力値保持 — BR-011。maxLength は CMP-003 共有定数参照）"
      - "packages/frontend/src/components/TodoItem.tsx — インライン編集・トグル・削除 + createdAt 表示（RF-08）"
      - "packages/frontend/src/components/TodoList.tsx — 一覧表示（順序は API-002 コントラクト — 防衛的ソートなし Q1=a）"
      - "packages/frontend/src/api/todoApi.ts — API クライアント（fetchTodo は RF-09 で削除済み）"
    Tests:
      - "packages/frontend/src/{App,components/TodoForm,components/TodoItem,components/TodoList}.test.{tsx} — 24 件"
      - "e2e/todo-smoke.spec.ts — BT-1〜5 の操作面（実ブラウザ）"
    Config:
      - "packages/frontend/vite.config.ts — Vite 7 / proxy + dev 値ヘッダ注入（RF-16 ローカル経路）"
      - "packages/frontend/package.json — build は vite build のみ（RF-13。型検査は CI typecheck ジョブ）"

